services:
  database:
    image: postgres:15-alpine
    container_name: db_gerenciador_projetos
    environment:
      POSTGRES_USER: admin_projeto
      POSTGRES_PASSWORD: senha_segura_123
      POSTGRES_DB: db_principal
    ports:
      - "5432:5432"
    volumes:
      - dados_do_postgres:/var/lib/postgresql/data

  db_viewer:
    image: adminer
    container_name: visualizador_db
    ports:
      - "8080:8080"
    depends_on:
      - database

volumes:
  dados_do_postgres:
